# Netlify config — publish the static site subfolder

[build]
  publish = "suno-writer-tutorials"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/lessons/:slug"
  to = "/lessons/:slug.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
